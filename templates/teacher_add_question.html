<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <meta charset="UTF-8">
    <title>New Question</title>
</head>
<body>
    <h1>Create New Question</h1>

    {% with messages = get_flashed_messages() %}
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    {% endwith %}

    <form method="POST">
        <label>Class</label><br>
        <select name="class_id" required>
            <option value="">Select a class</option>
            {% for cls in classes %}
                <option value="{{ cls.id }}" {% if selected_class_id and cls.id == selected_class_id %}selected{% endif %}>
                    {{ cls.name }} ({{ cls.join_code }})
                </option>
            {% endfor %}
        </select><br><br>

        <label>Question</label><br>
        <textarea name="text" rows="3" cols="50"></textarea><br><br>

        <label>Option A</label><br>
        <input type="text" name="option_a"><br><br>

        <label>Option B</label><br>
        <input type="text" name="option_b"><br><br>

        <label>Option C</label><br>
        <input type="text" name="option_c"><br><br>

        <label>Option D</label><br>
        <input type="text" name="option_d"><br><br>

        <label>Correct Option</label><br>
        <select name="correct_option">
            <option value="a">A</option>
            <option value="b">B</option>
            <option value="c">C</option>
            <option value="d">D</option>
        </select><br><br>

        <label>Point Value</label><br>
        <input type="number" name="point_value" value="10"><br><br>

        <button type="submit">Save Question</button>
    </form>

    <br>
    <a href="/teacher/dashboard">Back to dashboard</a>
</body>
</html>
